name: Quinn QA

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: quinn-qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npx vitest run --reporter=verbose

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets in diff
        id: secrets-check
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git diff origin/$BASE_REF...HEAD > diff.txt
          FOUND=0
          grep -iE "(aws_access_key_id|aws_secret_access_key)" diff.txt && FOUND=1
          grep -iE "(private_key|BEGIN RSA|BEGIN EC|BEGIN OPENSSH)" diff.txt && FOUND=1
          grep -iE "(password|secret|api_key|token)\s*[=:]\s*['\"][^'\"]+['\"]" diff.txt && FOUND=1
          grep -iE "ghp_|gho_|github_pat_" diff.txt && FOUND=1
          if [ "$FOUND" -eq 1 ]; then
            echo "SECRETS_FOUND=true" >> $GITHUB_OUTPUT
            echo "## Security Alert: Potential secrets detected" > security-report.txt
            grep -iE "(aws_access|private_key|password.*=|secret.*=|api_key.*=|token.*=|ghp_|gho_|github_pat_)" diff.txt >> security-report.txt 2>&1 || true
          else
            echo "SECRETS_FOUND=false" >> $GITHUB_OUTPUT
            echo "No secrets detected in PR diff." > security-report.txt
          fi

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.txt
          retention-days: 1

  ai-qa-review:
    name: AI QA Review (Multi-Agent)
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, security-scan]
    if: success() || needs.security-scan.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Prepare PR data
        id: prepare
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git diff origin/$BASE_REF...HEAD > pr-diff.txt
          echo "diff_lines=$(wc -l < pr-diff.txt)" >> $GITHUB_OUTPUT
          git diff --name-only origin/$BASE_REF...HEAD > changed-files.txt
          echo "changed_files=$(wc -l < changed-files.txt)" >> $GITHUB_OUTPUT
          cp security-report.txt security-result.txt 2>/dev/null || echo "No security report." > security-result.txt

      - name: Security Agent
        id: security-agent
        if: steps.prepare.outputs.diff_lines != '0'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_ENDPOINT: ${{ vars.AI_API_ENDPOINT || '' }}
          AI_MODEL: ${{ vars.AI_MODEL || '' }}
          AI_API_VERSION: ${{ vars.AI_API_VERSION || '2023-06-01' }}
        run: |
          DIFF=$(cat pr-diff.txt | jq -Rs .)
          FILES=$(cat changed-files.txt | jq -Rs .)
          SEC=$(cat security-result.txt | jq -Rs .)
          PROMPT="You are a Security Engineer reviewing this PR.\n\n## Changed Files\n${FILES}\n\n## PR Diff\n${DIFF}\n\n## Automated Secret Scan\n${SEC}\n\nAnalyze for: SQL injection, XSS, hardcoded credentials, IDOR, auth bypass, sensitive data in logs, missing rate limiting.\n\nOutput: 🟡 WARNING/🔴 CRITICAL at [file:line], or 🟢 SAFE\nFinal VERDICT: PASS or FAIL"
          BODY=$(jq -n --arg p "$PROMPT" --arg m "$AI_MODEL" '{model:$m,max_tokens:2000,messages:[{role:"user",content:$p}]}')
          RESP=$(curl -s -w "\n%{http_code}" "$AI_API_ENDPOINT" -H "Content-Type: application/json" -H "x-api-key: $AI_API_KEY" -H "anthropic-version: $AI_API_VERSION" -d "$BODY")
          echo "$RESPONSE" | tail -1 | sed '$d' | jq -r '.content[0].text // .error.message // "unavailable"' > security-agent-report.md 2>/dev/null || echo "Security analysis unavailable" > security-agent-report.md
          HTTP=$(echo "$RESP" | tail -1); BODY=$(echo "$RESP" | sed '$d')
          echo "$BODY" | jq -r '.content[0].text // .error.message // "unavailable"' > security-agent-report.md 2>/dev/null || echo "unavailable" > security-agent-report.md

      - name: Bug Agent
        id: bug-agent
        if: steps.prepare.outputs.diff_lines != '0'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_ENDPOINT: ${{ vars.AI_API_ENDPOINT || '' }}
          AI_MODEL: ${{ vars.AI_MODEL || '' }}
          AI_API_VERSION: ${{ vars.AI_API_VERSION || '2023-06-01' }}
        run: |
          DIFF=$(cat pr-diff.txt | jq -Rs .)
          FILES=$(cat changed-files.txt | jq -Rs .)
          PROMPT="You are a Senior Engineer reviewing this PR for bugs.\n\n## Changed Files\n${FILES}\n\n## PR Diff\n${DIFF}\n\nAnalyze for: null references, boundary errors, race conditions, resource leaks, wrong error handling, logic errors, type mismatches, breaking API changes.\n\nOutput: 🔴 BUG/🟡 CONCERN at [file:line], or 🟢 CLEAN\nFinal VERDICT: PASS or FAIL"
          BODY=$(jq -n --arg p "$PROMPT" --arg m "$AI_MODEL" '{model:$m,max_tokens:2000,messages:[{role:"user",content:$p}]}')
          RESP=$(curl -s -w "\n%{http_code}" "$AI_API_ENDPOINT" -H "Content-Type: application/json" -H "x-api-key: $AI_API_KEY" -H "anthropic-version: $AI_API_VERSION" -d "$BODY")
          HTTP=$(echo "$RESP" | tail -1); BODY=$(echo "$RESP" | sed '$d')
          echo "$BODY" | jq -r '.content[0].text // .error.message // "unavailable"' > bug-agent-report.md 2>/dev/null || echo "unavailable" > bug-agent-report.md

      - name: Style Agent
        id: style-agent
        if: steps.prepare.outputs.diff_lines != '0'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_ENDPOINT: ${{ vars.AI_API_ENDPOINT || '' }}
          AI_MODEL: ${{ vars.AI_MODEL || '' }}
          AI_API_VERSION: ${{ vars.AI_API_VERSION || '2023-06-01' }}
        run: |
          DIFF=$(cat pr-diff.txt | jq -Rs .)
          FILES=$(cat changed-files.txt | jq -Rs .)
          PROMPT="You are a Tech Lead reviewing code style and maintainability.\n\n## Changed Files\n${FILES}\n\n## PR Diff\n${DIFF}\n\nAnalyze for: naming, function length/complexity, duplication, missing comments, unused imports, magic numbers, inconsistent formatting.\n\nOutput: 🟡 SUGGESTION/🔴 ISSUE at [file:line], or 🟢 CLEAN\nFinal VERDICT: PASS or FAIL"
          BODY=$(jq -n --arg p "$PROMPT" --arg m "$AI_MODEL" '{model:$m,max_tokens:2000,messages:[{role:"user",content:$p}]}')
          RESP=$(curl -s -w "\n%{http_code}" "$AI_API_ENDPOINT" -H "Content-Type: application/json" -H "x-api-key: $AI_API_KEY" -H "anthropic-version: $AI_API_VERSION" -d "$BODY")
          HTTP=$(echo "$RESP" | tail -1); BODY=$(echo "$RESP" | sed '$d')
          echo "$BODY" | jq -r '.content[0].text // .error.message // "unavailable"' > style-agent-report.md 2>/dev/null || echo "unavailable" > style-agent-report.md

      - name: Post Line-Level Comments
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            function parseLineComments(reportPath, agentName) {
              if (!fs.existsSync(reportPath)) return [];
              const report = fs.readFileSync(reportPath, 'utf8');
              const comments = [];
              for (const line of report.split('\n')) {
                const match = line.match(/(?:🔴|🟡|🟢)\s+\S+:\s+(.*?)\s+at\s+(\S+):(\d+)/);
                if (match) {
                  comments.push({
                    body: `${agentName}: ${match[1]}`,
                    path: match[2],
                    line: parseInt(match[3]),
                    level: line.includes('🔴') ? 'CRITICAL' : line.includes('🟡') ? 'WARNING' : 'INFO'
                  });
                }
              }
              return comments;
            }
            const allComments = [
              ...parseLineComments('security-agent-report.md', '🛡️ Security Agent'),
              ...parseLineComments('bug-agent-report.md', '🐛 Bug Agent'),
              ...parseLineComments('style-agent-report.md', '🎨 Style Agent')
            ];
            for (const c of allComments) {
              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  body: c.body, path: c.path, line: c.line, side: 'RIGHT'
                });
              } catch (e) { /* skip out-of-range lines */ }
            }
            console.log(`Posted ${allComments.length} line-level comments`);

      - name: Post Consolidated QA Report
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let report = '## Quinn QA Report — Multi-Agent Review\n\n';
            report += '### Test Results\n';
            report += '| Check | Status |\n|-------|--------|\n';
            report += '| Unit Tests | ✅ Passed |\n';
            report += '| E2E Tests | ✅ Passed |\n';
            if (fs.existsSync('security-report.txt')) {
              const sec = fs.readFileSync('security-report.txt', 'utf8');
              const hasSecrets = sec.includes('SECRETS_FOUND=true');
              report += `| Secret Scan | ${hasSecrets ? '🔴 Detected' : '✅ Clean'} |\n`;
            }
            report += '\n### AI Agent Reports\n\n';
            const agents = [
              { file: 'security-agent-report.md', title: '🛡️ Security Agent' },
              { file: 'bug-agent-report.md', title: '🐛 Bug Agent' },
              { file: 'style-agent-report.md', title: '🎨 Style Agent' }
            ];
            for (const a of agents) {
              if (fs.existsSync(a.file)) {
                const content = fs.readFileSync(a.file, 'utf8');
                const verdict = content.includes('VERDICT: FAIL') ? '❌ FAIL' :
                               content.includes('VERDICT: PASS') ? '✅ PASS' : '⚠️ N/A';
                report += `**${a.title}** — ${verdict}\n\n`;
                report += content.replace(/Final VERDICT: (PASS|FAIL)\n?/, '') + '\n\n';
                const crits = (content.match(/🔴/g) || []).length;
                const warns = (content.match(/🟡/g) || []).length;
                if (crits) report += `> 🔴 ${crits} critical\n`;
                if (warns) report += `> 🟡 ${warns} warnings\n`;
                report += '\n---\n\n';
              } else {
                report += `**${a.title}** — ⚠️ unavailable\n\n---\n\n`;
              }
            }
            report += '*Line-level comments posted directly on the diff.*\n';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
